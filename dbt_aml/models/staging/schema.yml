version: 2

sources:
  - name: aml_raw
    description: >
      Raw AML transaction data loaded from PySpark pipeline Parquet output
      into BigQuery via bigquery/load_to_bq.py.
      Default dataset: aml_transactions.
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: aml_transactions
    tables:
      - name: transactions
        description: >
          10 000 synthetic AML transactions generated by scripts/ingest_transactions.py.
          Schema matches bigquery/schema.json exactly.
        columns:
          - name: transaction_id
            description: "Unique transaction identifier (TXN00000000)"
            tests:
              - not_null
              - unique
          - name: customer_id
            description: "Customer who initiated the transaction (CUST00000)"
            tests:
              - not_null
          - name: amount
            description: "Transaction amount (FLOAT64)"
            tests:
              - not_null
          - name: timestamp
            description: "UTC timestamp of the transaction (TIMESTAMP)"
          - name: originator_country
            description: "ISO 3166-1 alpha-2 country of the sender"
          - name: beneficiary_country
            description: "ISO 3166-1 alpha-2 country of the receiver"
          - name: is_flagged_source
            description: "Synthetic ground-truth label (true = intentionally suspicious)"

models:
  - name: stg_transactions
    description: >
      Staging view: renames timestamp → transaction_timestamp and casts
      amount / timestamp to canonical types. No business logic applied.
    columns:
      - name: transaction_id
        description: "Unique transaction identifier"
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Customer who initiated the transaction"
        tests:
          - not_null
      - name: amount
        description: "Transaction amount (FLOAT64)"
        tests:
          - not_null
      - name: transaction_timestamp
        description: "UTC transaction timestamp (renamed from raw timestamp column)"
