version: "3.9"

# Redis 7 NoSQL caching layer for the AML pipeline.
# Stores high-risk country codes (SET, 1-hour TTL) and pipeline run
# metadata (HASH, 24-hour TTL). allkeys-lru eviction so the cache
# degrades gracefully if memory pressure occurs.
#
# Usage:
#   docker compose -f docker-compose.redis.yml up -d
#   docker compose -f docker-compose.redis.yml exec redis redis-cli ping
#   docker compose -f docker-compose.redis.yml down

services:

  redis:
    image: redis:7-alpine
    container_name: aml_redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
